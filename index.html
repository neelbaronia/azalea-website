<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azalea Labs</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #050505;
            color: #f0f0f0;
            font-family: 'Courier New', Courier, monospace;
        }
        .bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
            object-fit: contain;
            opacity: 0.6;
            z-index: 1;
            image-rendering: pixelated;
        }
        .overlay {
            display: none;
        }
        .content {
            position: relative;
            z-index: 3;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 90px 20px 100px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            text-align: center;
            line-height: 1.6;
            opacity: 0.9;
            width: 50%;
            max-width: 800px;
        }
        .footer {
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
            text-align: center;
        }
        .tagline, .h2 {
            font-size: 16px;
            letter-spacing: 2.5px;
            opacity: 0.9;
            text-transform: uppercase;
            font-weight: 700;
        }
        .sub-link {
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 1px;
            transition: color 0.3s ease;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
        }
        .sub-link:hover {
            color: rgba(255,255,255,0.9);
            border-bottom-color: rgba(255,255,255,0.5);
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 14px; letter-spacing: 2px; width: 80%; }
            .tagline, .h2 { font-size: 14px; letter-spacing: 2px; }
            .content { padding-top: 60px; padding-bottom: 60px; }
        }
    </style>
</head>
<body>
    <img id="bg" class="bg" alt="">
    <div class="overlay"></div>
    <div class="content">
        <h1>"What is reading but silent conversation?" - Walter Savage Landor</h1>
        <div style="flex: 1;"></div>
        <div class="footer">
            <div class="h2">Coming Early 2026</div>
        </div>
    </div>

    <script>
        const gifs = [
            'azalea_ascii_animation.gif',
            'azalea_ascii_cosmic.gif',
            'azalea_ascii_cyberpunk.gif',
            'azalea_ascii_forest.gif',
            'azalea_ascii_gothic.gif',
            'azalea_ascii_lavender.gif',
            'azalea_ascii_matrix.gif',
            'azalea_ascii_neon.gif',
            'azalea_ascii_ocean.gif',
            'azalea_ascii_sunset.gif'
        ];
        
        // Select random GIF
        const randomGif = gifs[Math.floor(Math.random() * gifs.length)];
        
        // Set background
        const bgImg = document.getElementById('bg');
        bgImg.src = './' + randomGif;
    </script>
</body>
</html>
